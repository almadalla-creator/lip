<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>When Work Becomes You | Interactive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stage">
    <div id="book" class="book" aria-label="Interactive book">
      <div class="pages">

        <!-- PAGE 0: COVER -->
        <section class="page" data-index="0" data-type="cover">
          <div class="coverPage" style="background-image:url('Front%20Cover.jpg');">
            <button class="startBtn" type="button" data-action="start">Start</button>
          </div>
        </section>

        <!-- IMPORTANT: keep the rest of your pages EXACTLY as written,only ensure choices are buttons with class="choice" and data-next="X" -->
        <!-- PASTE YOUR EXISTING PAGES 1..LAST HERE,UNCHANGED -->
        <!-- Example node format (your content stays yours): -->
        <!--
        <section class="page" data-index="9" data-type="node">
          <div class="pageInner">
            <h2 class="nodeTitle">Node 1</h2>
            <p class="nodePrompt">...</p>
            <div class="choices">
              <button type="button" class="choice" data-choice="A" data-next="10">A) ...</button>
              <button type="button" class="choice" data-choice="B" data-next="11">B) ...</button>
              <button type="button" class="choice" data-choice="C" data-next="12">C) ...</button>
              <button type="button" class="choice" data-choice="D" data-next="13">D) ...</button>
            </div>
          </div>
        </section>
        -->

      </div>

      <!-- NAV BAR INSIDE BOOK -->
      <div class="navBar" aria-label="Navigation">
        <div class="brand">LIP EDITORIAL</div>
        <div id="pageLabel" class="pageLabel">1 / 1</div>
        <div class="navBtns">
          <button id="prevBtn" class="navBtn" type="button" aria-label="Previous page">‹</button>
          <button id="nextBtn" class="navBtn" type="button" aria-label="Next page">›</button>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
