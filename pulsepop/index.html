<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Pop | LipGen Studios</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .container {
      max-width: 720px;
      text-align: center;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      border-radius: 28px;
    }

    h1 {
      font-size: 48px;
      margin: 0 0 12px;
      letter-spacing: 1px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #b8c2d1;
    }

    .tagline {
      color: #4ade80;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .links {
      margin-top: 32px;
    }

    a {
      color: #4ade80;
      text-decoration: none;
      margin: 0 12px;
      font-weight: 700;
    }

    a:hover {
      text-decoration: underline;
    }

    .small {
      margin-top: 40px;
      font-size: 14px;
      color: #7f8ba0;
    }
  </style>
</head>
<body>
  <main class="container">
    <img src="pulsepop-icon-512.png" alt="Pulse Pop icon" class="logo" />

    <h1>Pulse Pop</h1>
    <p class="tagline">Tap fast. Stay precise. Beat your best.</p>

    <p>
      Pulse Pop is a fast-paced 30-second reflex game built for speed,
      focus, and precision. Tap every target, build combos, unlock badges,
      and push your score higher with each round.
    </p>

    <div class="links">
      <a href="./privacy.html">Privacy Policy</a>
      <a href="mailto:support@lipgenerations.com">Contact Support</a>
    </div>

    <p class="small">Published by LipGen Studios</p>
  </main>
</body>
</html>
